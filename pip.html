<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office PiP</title>
  <link rel="stylesheet" href="/public/pip.css">
</head>

<body>
  <!-- Draggable header area (fills space left of native window controls) -->
  <div class="pip-header" id="pipHeader">
    <span class="pip-header-label">Office</span>
    <button class="pip-back-btn" id="pipBackBtn" title="Back to dashboard">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="12" height="12" rx="2"/>
        <polyline points="6,1 1,1 1,6"/>
      </svg>
    </button>
  </div>

  <!-- Office canvas -->
  <div class="pip-canvas-area">
    <canvas id="office-canvas"></canvas>
  </div>

  <!-- Office Engine Scripts (same 9 modules as dashboard.html) -->
  <script src="/src/office/office-config.js?v=4"></script>
  <script src="/src/office/office-layers.js?v=4"></script>
  <script src="/src/office/office-coords.js?v=4"></script>
  <script src="/src/office/office-pathfinder.js?v=4"></script>
  <script src="/src/office/office-sprite.js?v=4"></script>
  <script src="/src/office/office-character.js?v=4"></script>
  <script src="/src/office/office-renderer.js?v=4"></script>
  <script src="/src/office/office-ui.js?v=4"></script>
  <script src="/src/office/office-init.js?v=4"></script>

  <!-- PiP Logic (must be last) -->
  <script src="/public/pip.js?v=4"></script>
</body>

</html>
