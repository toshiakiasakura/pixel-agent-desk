<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Agent Desk Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── 폰트 시스템 ── */
      --font-display: 'Press Start 2P', monospace;
      --font-body: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-ui: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;

      /* ── 배경 계층 (깊이감) ── */
      --color-bg-deep: #080c16;
      --color-bg: #0d1117;
      --color-card: #161b22;
      --color-card-hover: #1c2333;
      --color-border: #30363d;
      --color-border-active: #58a6ff;

      /* ── 텍스트 ── */
      --color-text: #e6edf3;
      --color-text-muted: #7d8590;
      --color-text-accent: #58a6ff;

      /* ── 시맨틱 ── */
      --color-primary: #58a6ff;
      --color-success: #3fb950;
      --color-warning: #d29922;
      --color-error: #f85149;
      --color-info: #a371f7;

      /* ── 통합 상태 색상 (styles.css, office-config.js와 동기화) ── */
      --color-state-working: #f97316;
      --color-state-thinking: #8b5cf6;
      --color-state-waiting: #7d8590;
      --color-state-done: #3fb950;
      --color-state-help: #f85149;
      --color-state-error: #f85149;
      --color-state-offline: #30363d;

      /* ── 글로우 시스템 ── */
      --glow-working: 0 0 20px rgba(249, 115, 22, 0.25), 0 0 4px rgba(249, 115, 22, 0.4);
      --glow-thinking: 0 0 20px rgba(139, 92, 246, 0.25), 0 0 4px rgba(139, 92, 246, 0.4);
      --glow-done: 0 0 20px rgba(63, 185, 80, 0.2), 0 0 4px rgba(63, 185, 80, 0.3);
      --glow-error: 0 0 20px rgba(248, 81, 73, 0.25), 0 0 4px rgba(248, 81, 73, 0.4);
      --glow-primary: 0 0 20px rgba(88, 166, 255, 0.2), 0 0 4px rgba(88, 166, 255, 0.3);

      /* ── 그림자 ── */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.6);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-ui);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      gap: 0;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--color-card);
      border-bottom: 1px solid var(--color-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--color-text);
      letter-spacing: 0.02em;
      line-height: 1.8;
    }

    .header-subtitle {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--color-bg-deep);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.75rem;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-text-muted);
      transition: background 0.3s ease;
    }

    .status-indicator.connected {
      background: var(--color-success);
      box-shadow: 0 0 8px var(--color-success);
    }

    .status-indicator.disconnected {
      background: var(--color-error);
    }

    /* 연결 끊김 배너 */
    .disconnect-banner {
      background: var(--color-error);
      color: #fff;
      text-align: center;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 100;
      grid-column: 1 / -1;
    }

    /* Sidebar */
    .sidebar {
      background: var(--color-card);
      border-right: 1px solid var(--color-border);
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .nav-section {
      margin-bottom: 24px;
    }

    .nav-title {
      padding: 0 20px 8px;
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
    }

    .nav-item {
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--color-text-muted);
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: var(--color-card-hover);
      color: var(--color-text);
    }

    .nav-item.active {
      background: rgba(88, 166, 255, 0.08);
      color: var(--color-primary);
      border-left: 3px solid var(--color-primary);
      border-right: none;
    }

    .live-feed {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      /* flex 컨테이너 오버플로 방지 */
    }

    .live-feed-title {
      padding: 0 20px 12px;
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
    }

    .live-feed-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 10px;
      min-height: 0;
      /* flex 자식 오버플로 방지 */
    }

    .live-feed-list::-webkit-scrollbar {
      width: 4px;
    }

    .live-feed-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .live-feed-list::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 2px;
    }

    .live-feed-item {
      padding: 8px 10px;
      margin-bottom: 4px;
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .live-feed-item .time {
      font-family: var(--font-body);
      color: var(--color-text-muted);
      font-size: 0.65rem;
    }

    .live-feed-item .message {
      color: var(--color-text);
      margin-top: 2px;
    }

    /* Main Content */
    .main-content {
      grid-column: 2;
      grid-row: 2;
      padding: 24px;
      overflow-y: auto;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      border-color: var(--color-border-active);
      box-shadow: var(--glow-primary);
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-icon {
      font-size: 1.5rem;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--color-text);
      letter-spacing: 0.02em;
    }

    .stat-change {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* Section */
    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
    }

    /* Agents Grid */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 16px;
    }

    .agent-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .agent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--color-border);
      transition: background 0.3s ease;
    }

    .agent-card.state-working::before {
      background: var(--color-state-working);
    }

    .agent-card.state-thinking::before {
      background: var(--color-state-thinking);
    }

    .agent-card.state-waiting::before {
      background: var(--color-state-waiting);
    }

    .agent-card.state-done::before {
      background: var(--color-state-done);
    }

    .agent-card.state-help::before {
      background: var(--color-state-help);
    }

    .agent-card.state-error::before {
      background: var(--color-state-error);
    }

    .agent-card:hover {
      border-color: var(--color-border-active);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    /* ── A3: 상태별 글로우 효과 ── */
    .agent-card.working {
      box-shadow: var(--glow-working);
      border-color: rgba(249, 115, 22, 0.4);
    }

    .agent-card.thinking {
      box-shadow: var(--glow-thinking);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .agent-card.done {
      box-shadow: var(--glow-done);
      border-color: rgba(63, 185, 80, 0.3);
    }

    .agent-card.help,
    .agent-card.error {
      box-shadow: var(--glow-error);
      border-color: rgba(248, 81, 73, 0.4);
    }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .agent-name {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-id {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-family: var(--font-body);
    }

    .agent-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .agent-status.working {
      background: rgba(249, 115, 22, 0.2);
      color: var(--color-state-working);
    }

    .agent-status.thinking {
      background: rgba(139, 92, 246, 0.2);
      color: var(--color-state-thinking);
    }

    .agent-status.waiting {
      background: rgba(148, 163, 184, 0.2);
      color: var(--color-state-waiting);
    }

    .agent-status.done,
    .agent-status.completed {
      background: rgba(34, 197, 94, 0.2);
      color: var(--color-state-done);
    }

    .agent-status.help {
      background: rgba(239, 68, 68, 0.2);
      color: var(--color-state-help);
    }

    .agent-status.error {
      background: rgba(239, 68, 68, 0.2);
      color: var(--color-state-error);
    }

    /* 활성 맥동 dot */
    .active-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-state-working);
      box-shadow: 0 0 6px var(--color-state-working);
      animation: active-pulse 1.5s ease-in-out infinite;
    }

    @keyframes active-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 현재 활동 표시 */
    .current-activity {
      font-family: var(--font-body);
      font-size: 0.8rem;
    }

    .current-activity.is-active {
      color: var(--color-state-working);
      font-weight: 600;
    }

    .agent-body {
      margin-bottom: 12px;
    }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .agent-row:last-child {
      margin-bottom: 0;
    }

    .agent-label {
      font-weight: 500;
      min-width: 60px;
    }

    .agent-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }

    .agent-tokens {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.875rem;
    }

    .token-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--color-text-muted);
    }

    .token-value {
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--color-text);
    }

    .agent-time {
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .type-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 8px;
    }

    .type-badge.main {
      background: rgba(59, 130, 246, 0.2);
      color: var(--color-primary);
    }

    .type-badge.subagent {
      background: rgba(236, 72, 153, 0.2);
      color: #ec4899;
    }

    .type-badge.teammate {
      background: rgba(34, 211, 238, 0.2);
      color: #22d3ee;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--color-text);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
      line-height: 1.8;
    }

    .empty-state-text {
      font-size: 1rem;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-muted);
    }

    /* Office View */
    .office-view {
      grid-column: 2;
      grid-row: 2;
      background: var(--color-bg-deep);
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #office-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .agents-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    /* Token Chart */
    .token-chart {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
    }

    .chart-bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chart-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      min-width: 120px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .bar-track {
      flex: 1;
      height: 24px;
      background: var(--color-bg);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-info));
      border-radius: 4px;
      transition: width 0.5s ease;
      position: relative;
    }

    .bar-value {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-text);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .bar-total {
      min-width: 80px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text);
      text-align: right;
    }

    /* ─── Heatmap (Activity History) ─── */
    .heatmap-container {
      animation: fadeIn 0.3s ease;
    }

    .heatmap-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .heatmap-summary .stat-card {
      text-align: center;
    }

    .heatmap-summary .stat-value {
      font-size: 1rem;
    }

    .heatmap-metrics {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .heatmap-metric-btn {
      padding: 6px 16px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      background: transparent;
      color: var(--color-text-muted);
      font-family: var(--font-body);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .heatmap-metric-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }

    .heatmap-metric-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    .heatmap-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .heatmap-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-rows: auto repeat(7, 14px);
      grid-auto-columns: 14px;
      grid-auto-flow: column;
      gap: 3px;
      width: max-content;
    }

    .heatmap-month-label {
      font-size: 0.7rem;
      color: var(--color-text-muted);
      grid-row: 1;
      line-height: 14px;
      white-space: nowrap;
    }

    .heatmap-day-label {
      font-size: 0.65rem;
      color: var(--color-text-muted);
      grid-row: auto;
      text-align: right;
      padding-right: 4px;
      line-height: 14px;
      width: 28px;
    }

    .heatmap-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: outline 0.1s ease;
    }

    .heatmap-cell:hover {
      outline: 2px solid var(--color-text-muted);
      outline-offset: -1px;
    }

    .heatmap-cell.level-0 { background: #1e293b; }
    .heatmap-cell.level-1 { background: #1e3a5f; }
    .heatmap-cell.level-2 { background: #1d4ed8; }
    .heatmap-cell.level-3 { background: #3b82f6; }
    .heatmap-cell.level-4 { background: #60a5fa; }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      justify-content: flex-end;
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    .heatmap-legend-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .heatmap-tooltip {
      position: fixed;
      background: #1e293b;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--color-text);
      pointer-events: none;
      z-index: 1000;
      box-shadow: var(--shadow-lg);
      display: none;
      max-width: 260px;
    }

    .heatmap-tooltip .tt-date {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--color-primary);
    }

    .heatmap-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 2px;
    }

    .heatmap-tooltip .tt-label {
      color: var(--color-text-muted);
    }

    .heatmap-tooltip .tt-value {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div>
          <h1 class="header-title">🤖 Pixel Agent Desk</h1>
          <p class="header-subtitle">AI 에이전트 실시간 모니터링 대시보드</p>
        </div>
      </div>
      <div class="header-right">
        <div class="connection-status" role="status" aria-live="polite">
          <span class="status-indicator" id="statusIndicator" aria-hidden="true"></span>
          <span id="connectionStatus">연결 중...</span>
        </div>
      </div>
    </header>

    <!-- 연결 끊김 배너 -->
    <div id="disconnectBanner" class="disconnect-banner" style="display:none;">
      연결 끊김 — 서버에 재연결 시도 중...
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="nav-section">
        <div class="nav-title">메뉴</div>
        <div class="nav-item active" data-view="office">
          <span>🏢</span>
          <span>오피스</span>
        </div>
        <div class="nav-item" data-view="overview">
          <span>📊</span>
          <span>개요</span>
        </div>
        <div class="nav-item" data-view="agents">
          <span>👥</span>
          <span>에이전트</span>
        </div>
        <div class="nav-item" data-view="tokens">
          <span>💰</span>
          <span>토큰</span>
        </div>
        <div class="nav-item" data-view="heatmap">
          <span>📅</span>
          <span>활동 기록</span>
        </div>
      </div>

      <div class="live-feed">
        <div class="live-feed-title">실시간 이벤트</div>
        <div class="live-feed-list" id="liveFeedList">
          <!-- Live feed items will be inserted here -->
        </div>
      </div>
    </aside>

    <!-- Office View -->
    <div id="officeView" class="office-view">
      <canvas id="office-canvas"></canvas>
    </div>

    <!-- Main Content (Dashboard/Agents/Tokens/Heatmap) -->
    <main class="main-content" id="mainContent" style="display:none">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>데이터를 불러오는 중...</span>
      </div>
    </main>
  </div>

  <!-- Heatmap Tooltip (global, position: fixed) -->
  <div class="heatmap-tooltip" id="heatmapTooltip"></div>

  <!-- Office modules (v2: avatar sync) -->
  <script src="/src/office/office-config.js?v=2"></script>
  <script src="/src/office/office-layers.js?v=2"></script>
  <script src="/src/office/office-coords.js?v=2"></script>
  <script src="/src/office/office-pathfinder.js?v=2"></script>
  <script src="/src/office/office-sprite.js?v=2"></script>
  <script src="/src/office/office-character.js?v=2"></script>
  <script src="/src/office/office-renderer.js?v=2"></script>
  <script src="/src/office/office-ui.js?v=2"></script>
  <script src="/src/office/office-init.js?v=2"></script>

  <script>
    /**
     * Pixel Agent Desk Dashboard
     * SSE 기반 실시간 업데이트
     */

    // 상태 관리
    const state = {
      agents: new Map(), // sessionId -> agent data
      stats: {
        total: 0,
        active: 0,
        completed: 0,
        totalTokens: 0,
        totalCost: 0
      },
      connected: false,
      currentView: localStorage.getItem('dashboard-tab') || 'office'
    };

    // DOM 요소
    const elements = {
      mainContent: document.getElementById('mainContent'),
      liveFeedList: document.getElementById('liveFeedList'),
      statusIndicator: document.getElementById('statusIndicator'),
      connectionStatus: document.getElementById('connectionStatus')
    };

    /**
     * SSE 연결 시작 (지수 백오프 재연결)
     */
    let _sseReconnectDelay = 1000;
    let _sseEventSource = null;

    function connectSSE() {
      // 기존 연결 정리
      if (_sseEventSource) {
        _sseEventSource.close();
        _sseEventSource = null;
      }

      const eventSource = new EventSource('http://localhost:3000/api/events');
      _sseEventSource = eventSource;

      eventSource.onopen = () => {
        _sseReconnectDelay = 1000; // 재연결 성공 시 딜레이 초기화
        state.connected = true;
        updateConnectionStatus(true);
        addLiveFeed('시스템', '대시보드에 연결되었습니다');
      };

      eventSource.onerror = () => {
        state.connected = false;
        updateConnectionStatus(false);
        addLiveFeed('시스템', '연결이 끊어졌습니다. 재연결 중...');

        // EventSource 닫고 수동 재연결 (지수 백오프)
        eventSource.close();
        _sseEventSource = null;
        const delay = _sseReconnectDelay;
        _sseReconnectDelay = Math.min(_sseReconnectDelay * 2, 30000);
        setTimeout(connectSSE, delay);
      };

      // 이벤트 리스너
      eventSource.addEventListener('connected', (event) => {
        // 초기 데이터 로드
        fetchInitialData();
      });

      eventSource.addEventListener('agent.created', (event) => {
        const payload = JSON.parse(event.data);
        const data = payload.data;
        updateAgent(data);
        officeOnAgentCreated(data);
        addLiveFeed('생성', `${data.name || 'Agent'} 에이전트가 생성되었습니다`);
      });

      eventSource.addEventListener('agent.updated', (event) => {
        const payload = JSON.parse(event.data);
        const data = payload.data;
        updateAgent(data);
        officeOnAgentUpdated(data);
      });

      eventSource.addEventListener('agent.removed', (event) => {
        const payload = JSON.parse(event.data);
        const data = payload.data;
        removeAgent(data.id);
        officeOnAgentRemoved(data);
        addLiveFeed('제거', `에이전트가 제거되었습니다 (${data.id?.slice(0, 8)}...)`);
      });
    }

    /**
     * 초기 데이터 로드
     */
    async function fetchInitialData() {
      try {
        const response = await fetch('http://localhost:3000/api/agents');
        const agents = await response.json();

        for (const agent of agents) {
          state.agents.set(agent.id, agent);
        }

        updateStats();
        render();
      } catch (error) {
        console.error('[Dashboard] 초기 데이터 로드 실패:', error);
        elements.mainContent.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-title">연결 실패</div>
            <div class="empty-state-text">에이전트 데이터를 불러올 수 없습니다.</div>
            <div class="empty-state-text" style="font-size: 0.875rem; margin-top: 8px;">
              SSE 연결이 복구되면 자동으로 데이터가 갱신됩니다
            </div>
          </div>
        `;
      }
    }

    /**
     * 에이전트 업데이트
     */
    function updateAgent(agent) {
      state.agents.set(agent.id, agent);
      updateStats();

      // in-place DOM 업데이트: 기존 카드가 있으면 교체, 없으면 전체 렌더
      const existingCard = document.querySelector(`[data-card-id="${agent.id}"]`);
      if (existingCard && (state.currentView === 'overview' || state.currentView === 'agents')) {
        const temp = document.createElement('div');
        temp.innerHTML = renderAgentCard(agent);
        const newCard = temp.firstElementChild;
        existingCard.replaceWith(newCard);
      } else {
        render();
      }
    }

    /**
     * 에이전트 제거
     */
    function removeAgent(sessionId) {
      state.agents.delete(sessionId);
      updateStats();

      // in-place DOM 제거
      const existingCard = document.querySelector(`[data-card-id="${sessionId}"]`);
      if (existingCard) {
        existingCard.remove();
      }

      // 에이전트가 0개면 빈 상태 렌더
      if (state.agents.size === 0) {
        render();
      }
    }

    /**
     * 통계 업데이트
     */
    function updateStats() {
      const agents = Array.from(state.agents.values());

      state.stats.total = agents.length;
      state.stats.active = agents.filter(a =>
        a.status === 'working' || a.status === 'thinking'
      ).length;
      state.stats.completed = agents.filter(a =>
        a.status === 'done' || a.status === 'completed'
      ).length;
      state.stats.totalTokens = agents.reduce((sum, a) =>
        sum + (a.tokenUsage?.inputTokens || 0) + (a.tokenUsage?.outputTokens || 0), 0
      );
      state.stats.totalCost = agents.reduce((sum, a) =>
        sum + (a.tokenUsage?.estimatedCost || 0), 0
      );
    }

    /**
     * 연결 상태 업데이트
     */
    function updateConnectionStatus(connected) {
      const banner = document.getElementById('disconnectBanner');
      if (connected) {
        elements.statusIndicator.classList.add('connected');
        elements.statusIndicator.classList.remove('disconnected');
        elements.connectionStatus.textContent = '연결됨';
        if (banner) banner.style.display = 'none';
      } else {
        elements.statusIndicator.classList.remove('connected');
        elements.statusIndicator.classList.add('disconnected');
        elements.connectionStatus.textContent = '연결 안됨';
        if (banner) banner.style.display = '';
      }
    }

    /**
     * 라이브 피드 추가
     */
    function addLiveFeed(type, message) {
      const item = document.createElement('div');
      item.className = 'live-feed-item';

      const time = new Date().toLocaleTimeString('ko-KR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });

      item.innerHTML = `
        <div class="time">${time}</div>
        <div class="message">[${type}] ${message}</div>
      `;

      elements.liveFeedList.insertBefore(item, elements.liveFeedList.firstChild);

      // 최대 30개만 유지
      while (elements.liveFeedList.children.length > 30) {
        elements.liveFeedList.removeChild(elements.liveFeedList.lastChild);
      }
    }

    /**
     * 렌더링
     */
    function render() {
      const officeView = document.getElementById('officeView');
      const mainContent = elements.mainContent;

      if (state.currentView === 'office') {
        officeView.style.display = 'flex';
        mainContent.style.display = 'none';
        return;
      }

      officeView.style.display = 'none';
      mainContent.style.display = 'block';

      if (state.currentView === 'overview') {
        renderOverview();
      } else if (state.currentView === 'agents') {
        renderAgents();
      } else if (state.currentView === 'tokens') {
        renderTokens();
      } else if (state.currentView === 'heatmap') {
        renderHeatmap();
      }
    }

    /**
     * 개요 렌더링
     */
    function renderOverview() {
      const agents = Array.from(state.agents.values());

      if (agents.length === 0) {
        renderEmpty();
        return;
      }

      elements.mainContent.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-icon">👥</span>
              <span class="stat-label">전체 에이전트</span>
            </div>
            <div class="stat-value">${state.stats.total}</div>
            <div class="stat-change">현재 활성: ${state.stats.active}</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-icon">⚡</span>
              <span class="stat-label">활성 에이전트</span>
            </div>
            <div class="stat-value">${state.stats.active}</div>
            <div class="stat-change">작업/생각 중</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-icon">✅</span>
              <span class="stat-label">완료된 작업</span>
            </div>
            <div class="stat-value">${state.stats.completed}</div>
            <div class="stat-change">완료율: ${state.stats.total > 0 ? Math.round(state.stats.completed / state.stats.total * 100) : 0}%</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-icon">💰</span>
              <span class="stat-label">총 비용</span>
            </div>
            <div class="stat-value">$${state.stats.totalCost.toFixed(4)}</div>
            <div class="stat-change">토큰: ${formatNumber(state.stats.totalTokens)}</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2 class="section-title">활성 에이전트</h2>
          </div>
          <div class="agents-grid">
            ${agents.slice(0, 6).map(agent => renderAgentCard(agent)).join('')}
          </div>
        </div>
      `;
    }

    /**
     * 에이전트 뷰 렌더링
     */
    function renderAgents() {
      const agents = Array.from(state.agents.values());

      if (agents.length === 0) {
        renderEmpty();
        return;
      }

      // 프로젝트별 그룹화
      const groups = new Map();
      for (const agent of agents) {
        const project = agent.projectPath?.split('/').pop() || 'Default';
        if (!groups.has(project)) {
          groups.set(project, []);
        }
        groups.get(project).push(agent);
      }

      let html = '<div class="section">';

      for (const [project, projectAgents] of groups) {
        html += `
          <div class="section-header">
            <h2 class="section-title">📁 ${project}</h2>
            <span style="color: var(--color-text-muted);">${projectAgents.length} 에이전트</span>
          </div>
          <div class="agents-grid" style="margin-bottom: 24px;">
            ${projectAgents.map(agent => renderAgentCard(agent)).join('')}
          </div>
        `;
      }

      html += '</div>';
      elements.mainContent.innerHTML = html;
    }

    /**
     * 토큰 뷰 렌더링
     */
    function renderTokens() {
      const agents = Array.from(state.agents.values());

      if (agents.length === 0) {
        renderEmpty();
        return;
      }

      // 정렬: 토큰 사용량 순
      const sortedAgents = [...agents].sort((a, b) => {
        const aTokens = (a.tokenUsage?.inputTokens || 0) + (a.tokenUsage?.outputTokens || 0);
        const bTokens = (b.tokenUsage?.inputTokens || 0) + (b.tokenUsage?.outputTokens || 0);
        return bTokens - aTokens;
      });

      const maxTokens = Math.max(...sortedAgents.map(a =>
        (a.tokenUsage?.inputTokens || 0) + (a.tokenUsage?.outputTokens || 0)
      ));

      elements.mainContent.innerHTML = `
        <div class="stats-grid" style="margin-bottom: 24px;">
          <div class="stat-card" style="grid-column: span 2;">
            <div class="stat-header">
              <span class="stat-icon">📈</span>
              <span class="stat-label">총 토큰 사용량</span>
            </div>
            <div class="stat-value">${formatNumber(state.stats.totalTokens)}</div>
            <div class="stat-change">활성화된 모든 세션 합산</div>
          </div>
          <div class="stat-card" style="grid-column: span 2;">
            <div class="stat-header">
              <span class="stat-icon">💰</span>
              <span class="stat-label">총 예상 비용</span>
            </div>
            <div class="stat-value">$${state.stats.totalCost.toFixed(4)}</div>
            <div class="stat-change">Claude API 청구 기준</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2 class="section-title">토큰 사용량 상세</h2>
          </div>
          <div class="token-chart">
            <h3 class="chart-title">에이전트별 토큰 사용량</h3>
            <div class="chart-bars">
              ${sortedAgents.map(agent => {
        const inputTokens = agent.tokenUsage?.inputTokens || 0;
        const outputTokens = agent.tokenUsage?.outputTokens || 0;
        const totalTokens = inputTokens + outputTokens;
        const percentage = maxTokens > 0 ? (totalTokens / maxTokens * 100) : 0;

        return `
                  <div class="chart-bar">
                    <div class="bar-label">${agent.name || agent.id.slice(0, 8)}</div>
                    <div class="bar-track">
                      <div class="bar-fill" style="width: ${percentage}%">
                        <span class="bar-value">${formatNumber(totalTokens)}</span>
                      </div>
                    </div>
                    <div class="bar-total">$${(agent.tokenUsage?.estimatedCost || 0).toFixed(4)}</div>
                  </div>
                `;
      }).join('')}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2 class="section-title">모든 에이전트</h2>
          </div>
          <div class="agents-grid">
            ${sortedAgents.map(agent => renderAgentCard(agent)).join('')}
          </div>
        </div>
      `;
    }

    /**
     * 에이전트 카드 렌더링
     */
    function renderAgentCard(agent) {
      const statusClass = getStatusClass(agent.status);
      const statusText = getStatusText(agent.status);
      const typeBadge = getTypeBadge(agent);
      const elapsed = formatTime(agent.timing?.elapsed || 0);
      const inputTokens = agent.tokenUsage?.inputTokens || 0;
      const outputTokens = agent.tokenUsage?.outputTokens || 0;
      const totalTokens = inputTokens + outputTokens;
      const cost = agent.tokenUsage?.estimatedCost || 0;
      const project = agent.projectPath?.split('/').pop() || 'Default';
      const model = agent.model || 'Unknown';
      const isActive = agent.status === 'working' || agent.status === 'thinking';
      const activeDot = isActive ? '<span class="active-dot"></span>' : '';
      const currentActivity = agent.currentTool || (isActive ? statusText : '-');

      return `
        <div class="agent-card ${statusClass}" data-card-id="${agent.id}">
          <div class="agent-header">
            <div class="agent-name">
              ${activeDot}
              <span>${agent.name || 'Agent'}</span>
              ${typeBadge}
            </div>
            <div class="agent-status ${statusClass}" role="status" aria-label="상태: ${statusText}">${statusText}</div>
          </div>
          <div class="agent-body">
            <div class="agent-row">
              <span class="agent-label">ID:</span>
              <span class="agent-id">${agent.id.slice(0, 8)}...</span>
            </div>
            <div class="agent-row">
              <span class="agent-label">프로젝트:</span>
              <span>${project}</span>
            </div>
            <div class="agent-row">
              <span class="agent-label">모델:</span>
              <span>${model}</span>
            </div>
            <div class="agent-row">
              <span class="agent-label">현재 활동:</span>
              <span class="current-activity ${isActive ? 'is-active' : ''}">${currentActivity}</span>
            </div>
          </div>
          <div class="agent-footer">
            <div class="agent-tokens">
              <div class="token-item">
                <span>📥</span>
                <span class="token-value">${formatNumber(inputTokens)}</span>
              </div>
              <div class="token-item">
                <span>📤</span>
                <span class="token-value">${formatNumber(outputTokens)}</span>
              </div>
              <div class="token-item">
                <span>💰</span>
                <span class="token-value">$${cost.toFixed(4)}</span>
              </div>
            </div>
            <div class="agent-time">⏱️ ${elapsed}</div>
          </div>
        </div>
      `;
    }

    /**
     * 빈 상태 렌더링
     */
    function renderEmpty() {
      elements.mainContent.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">😴</div>
          <div class="empty-state-title">대기 중</div>
          <div class="empty-state-text">현재 작업 중인 에이전트가 없습니다.</div>
          <div class="empty-state-text" style="font-size: 0.875rem; margin-top: 8px;">
            Claude CLI에서 작업을 시작하면 자동으로 표시됩니다
          </div>
        </div>
      `;
    }

    /**
     * 상태 클래스 반환
     */
    function getStatusClass(status) {
      const statusMap = {
        'working': 'working',
        'thinking': 'thinking',
        'waiting': 'waiting',
        'done': 'done',
        'completed': 'done',
        'help': 'help',
        'error': 'error'
      };
      return statusMap[status] || 'waiting';
    }

    /**
     * 상태 텍스트 반환
     */
    function getStatusText(status) {
      const statusMap = {
        'working': '작업 중',
        'thinking': '생각 중',
        'waiting': '대기 중',
        'done': '완료',
        'completed': '완료',
        'help': '도움 필요',
        'error': '에러'
      };
      return statusMap[status] || status;
    }

    /**
     * 타입 뱃지 반환
     */
    function getTypeBadge(agent) {
      if (agent.metadata?.isSubagent) {
        return '<span class="type-badge subagent">Sub</span>';
      } else if (agent.metadata?.isTeammate) {
        return '<span class="type-badge teammate">Team</span>';
      } else {
        return '<span class="type-badge main">Main</span>';
      }
    }

    /**
     * 시간 포맷
     */
    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      } else if (minutes > 0) {
        return `${minutes}m ${seconds}s`;
      } else {
        return `${seconds}s`;
      }
    }

    /**
     * 숫자 포맷
     */
    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      } else if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
      }
      return num.toString();
    }

    // ─── Heatmap (Activity History) ───

    /** 히트맵 상태 */
    const heatmapState = {
      data: null,       // { days: { "YYYY-MM-DD": {...} }, lastScan }
      metric: 'sessions', // sessions | tokens | cost | toolUses
      loading: false,
    };

    /**
     * 히트맵 데이터 fetch
     */
    async function fetchHeatmapData() {
      heatmapState.loading = true;
      try {
        const res = await fetch('http://localhost:3000/api/heatmap?days=365');
        heatmapState.data = await res.json();
      } catch (e) {
        console.error('[Heatmap] fetch 실패:', e);
        heatmapState.data = { days: {}, lastScan: 0 };
      }
      heatmapState.loading = false;
    }

    /**
     * 히트맵 뷰 렌더링
     */
    async function renderHeatmap() {
      if (!heatmapState.data) {
        elements.mainContent.innerHTML = `
          <div class="loading">
            <div class="loading-spinner"></div>
            <span>활동 기록을 불러오는 중...</span>
          </div>`;
        await fetchHeatmapData();
      }

      const days = heatmapState.data.days || {};
      const metric = heatmapState.metric;

      // 요약 통계 계산
      const summary = calculateHeatmapSummary(days);

      // 메트릭 버튼
      const metrics = [
        { key: 'sessions', label: '세션 수' },
        { key: 'tokens', label: '토큰' },
        { key: 'cost', label: '비용' },
        { key: 'toolUses', label: '도구 사용' },
      ];

      elements.mainContent.innerHTML = `
        <div class="heatmap-container">
          <div class="heatmap-summary">
            <div class="stat-card">
              <div class="stat-header"><span class="stat-icon">📊</span><span class="stat-label">총 세션</span></div>
              <div class="stat-value">${summary.totalSessions}</div>
            </div>
            <div class="stat-card">
              <div class="stat-header"><span class="stat-icon">📆</span><span class="stat-label">활성 일수</span></div>
              <div class="stat-value">${summary.activeDays}</div>
            </div>
            <div class="stat-card">
              <div class="stat-header"><span class="stat-icon">🔥</span><span class="stat-label">연속 일수</span></div>
              <div class="stat-value">${summary.currentStreak}</div>
              <div class="stat-change">최장: ${summary.longestStreak}일</div>
            </div>
            <div class="stat-card">
              <div class="stat-header"><span class="stat-icon">💰</span><span class="stat-label">총 비용</span></div>
              <div class="stat-value">$${summary.totalCost.toFixed(2)}</div>
            </div>
          </div>

          <div class="heatmap-metrics">
            ${metrics.map(m => `
              <button class="heatmap-metric-btn ${metric === m.key ? 'active' : ''}"
                      onclick="changeHeatmapMetric('${m.key}')">${m.label}</button>
            `).join('')}
          </div>

          <div class="heatmap-card">
            <div class="heatmap-scroll">
              <div class="heatmap-grid" id="heatmapGrid"></div>
            </div>
            <div class="heatmap-legend">
              <span>적음</span>
              <div class="heatmap-legend-cell level-0" style="background:#1e293b"></div>
              <div class="heatmap-legend-cell level-1" style="background:#1e3a5f"></div>
              <div class="heatmap-legend-cell level-2" style="background:#1d4ed8"></div>
              <div class="heatmap-legend-cell level-3" style="background:#3b82f6"></div>
              <div class="heatmap-legend-cell level-4" style="background:#60a5fa"></div>
              <span>많음</span>
            </div>
          </div>
        </div>`;

      buildHeatmapGrid(days, metric);
      attachHeatmapTooltips(days);
    }

    /**
     * 히트맵 그리드 구성 (53주 x 7일)
     */
    function buildHeatmapGrid(days, metric) {
      const grid = document.getElementById('heatmapGrid');
      if (!grid) return;

      // 오늘 기준 53주(371일)
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const dayOfWeek = today.getDay(); // 0=Sun

      // 시작일: 52주 전 일요일
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - (52 * 7 + dayOfWeek));

      // 메트릭별 값 추출 함수
      const getValue = (dayData) => {
        if (!dayData) return 0;
        switch (metric) {
          case 'sessions': return dayData.sessions || 0;
          case 'tokens': return (dayData.inputTokens || 0) + (dayData.outputTokens || 0);
          case 'cost': return dayData.estimatedCost || 0;
          case 'toolUses': return dayData.toolUses || 0;
          default: return 0;
        }
      };

      // 모든 날짜의 값 수집 (레벨 계산용)
      const allValues = [];
      const cellData = [];
      const d = new Date(startDate);
      while (d <= today) {
        const dateStr = d.toISOString().slice(0, 10);
        const val = getValue(days[dateStr]);
        allValues.push(val);
        cellData.push({ date: dateStr, value: val, dayOfWeek: d.getDay() });
        d.setDate(d.getDate() + 1);
      }

      // 비제로 값만으로 퍼센타일 기반 레벨 계산
      const nonZero = allValues.filter(v => v > 0).sort((a, b) => a - b);
      const getLevel = (val) => {
        if (val === 0) return 0;
        if (nonZero.length === 0) return 0;
        const p25 = nonZero[Math.floor(nonZero.length * 0.25)] || 1;
        const p50 = nonZero[Math.floor(nonZero.length * 0.50)] || 1;
        const p75 = nonZero[Math.floor(nonZero.length * 0.75)] || 1;
        if (val <= p25) return 1;
        if (val <= p50) return 2;
        if (val <= p75) return 3;
        return 4;
      };

      // 요일 라벨 (첫 열)
      const dayLabels = ['', 'Mon', '', 'Wed', '', 'Fri', ''];
      grid.innerHTML = '';

      // 월 라벨을 위한 배열 (week index → month name)
      const weekMonths = new Map();
      let cellIdx = 0;

      // 첫 열: 요일 라벨
      // 월 라벨 자리 (빈칸)
      const monthSpacer = document.createElement('div');
      monthSpacer.className = 'heatmap-month-label';
      monthSpacer.textContent = '';
      grid.appendChild(monthSpacer);

      for (let row = 0; row < 7; row++) {
        const label = document.createElement('div');
        label.className = 'heatmap-day-label';
        label.textContent = dayLabels[row];
        grid.appendChild(label);
      }

      // 주별 열 생성
      let currentWeek = -1;
      let lastMonth = -1;

      for (let i = 0; i < cellData.length; i++) {
        const cell = cellData[i];
        const cellDate = new Date(cell.date + 'T00:00:00');
        // 주가 바뀌면 월 라벨 추가
        if (cell.dayOfWeek === 0 || i === 0) {
          currentWeek++;
          const monthIdx = cellDate.getMonth();
          const monthLabel = document.createElement('div');
          monthLabel.className = 'heatmap-month-label';

          // 월이 바뀌는 첫 주에만 라벨 표시
          if (monthIdx !== lastMonth) {
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                                'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            monthLabel.textContent = monthNames[monthIdx];
            lastMonth = monthIdx;
          }
          grid.appendChild(monthLabel);
        }

        // 셀 생성
        const level = getLevel(cell.value);
        const div = document.createElement('div');
        div.className = `heatmap-cell level-${level}`;
        div.dataset.date = cell.date;
        grid.appendChild(div);
      }
    }

    /**
     * 히트맵 툴팁 이벤트
     */
    function attachHeatmapTooltips(days) {
      const tooltip = document.getElementById('heatmapTooltip');
      if (!tooltip) return;

      const grid = document.getElementById('heatmapGrid');
      if (!grid) return;

      grid.addEventListener('mouseover', (e) => {
        const cell = e.target.closest('.heatmap-cell');
        if (!cell) return;

        const dateStr = cell.dataset.date;
        const dayData = days[dateStr];
        const dateObj = new Date(dateStr + 'T00:00:00');
        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
        const formatted = `${dateStr} (${dayNames[dateObj.getDay()]}요일)`;

        let html = `<div class="tt-date">${formatted}</div>`;
        if (dayData) {
          html += `
            <div class="tt-row"><span class="tt-label">세션</span><span class="tt-value">${dayData.sessions || 0}개</span></div>
            <div class="tt-row"><span class="tt-label">사용자 메시지</span><span class="tt-value">${dayData.userMessages || 0}</span></div>
            <div class="tt-row"><span class="tt-label">어시스턴트 메시지</span><span class="tt-value">${dayData.assistantMessages || 0}</span></div>
            <div class="tt-row"><span class="tt-label">도구 사용</span><span class="tt-value">${dayData.toolUses || 0}회</span></div>
            <div class="tt-row"><span class="tt-label">입력 토큰</span><span class="tt-value">${formatNumber(dayData.inputTokens || 0)}</span></div>
            <div class="tt-row"><span class="tt-label">출력 토큰</span><span class="tt-value">${formatNumber(dayData.outputTokens || 0)}</span></div>
            <div class="tt-row"><span class="tt-label">예상 비용</span><span class="tt-value">$${(dayData.estimatedCost || 0).toFixed(4)}</span></div>`;
          if (dayData.projects && dayData.projects.length > 0) {
            html += `<div class="tt-row"><span class="tt-label">프로젝트</span><span class="tt-value">${dayData.projects.join(', ')}</span></div>`;
          }
        } else {
          html += '<div class="tt-row"><span class="tt-label">활동 없음</span></div>';
        }

        tooltip.innerHTML = html;
        tooltip.style.display = 'block';

        const rect = cell.getBoundingClientRect();
        tooltip.style.left = (rect.left + rect.width / 2) + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';

        // 화면 밖으로 나가면 보정
        const ttRect = tooltip.getBoundingClientRect();
        if (ttRect.left < 0) tooltip.style.left = '8px';
        if (ttRect.right > window.innerWidth) tooltip.style.left = (window.innerWidth - ttRect.width - 8) + 'px';
        if (ttRect.top < 0) tooltip.style.top = (rect.bottom + 8) + 'px';
      });

      grid.addEventListener('mouseout', (e) => {
        const cell = e.target.closest('.heatmap-cell');
        if (!cell) return;
        tooltip.style.display = 'none';
      });
    }

    /**
     * 히트맵 요약 통계 계산
     */
    function calculateHeatmapSummary(days) {
      let totalSessions = 0;
      let activeDays = 0;
      let totalCost = 0;
      const dates = Object.keys(days).sort();

      for (const date of dates) {
        const d = days[date];
        totalSessions += d.sessions || 0;
        totalCost += d.estimatedCost || 0;
        if ((d.sessions || 0) > 0) activeDays++;
      }

      // 연속 일수(streak) 계산 — 오늘부터 과거로
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      let currentStreak = 0;
      const check = new Date(today);
      while (true) {
        const dateStr = check.toISOString().slice(0, 10);
        const d = days[dateStr];
        if (d && (d.sessions || 0) > 0) {
          currentStreak++;
          check.setDate(check.getDate() - 1);
        } else {
          break;
        }
      }

      // 최장 연속 일수 (날짜 연속성 검증)
      let longestStreak = 0;
      let streak = 0;
      if (dates.length > 0) {
        const start = new Date(dates[0] + 'T00:00:00');
        const end = new Date(dates[dates.length - 1] + 'T00:00:00');
        const d2 = new Date(start);
        while (d2 <= end) {
          const ds = d2.toISOString().slice(0, 10);
          if (days[ds] && (days[ds].sessions || 0) > 0) {
            streak++;
            if (streak > longestStreak) longestStreak = streak;
          } else {
            streak = 0;
          }
          d2.setDate(d2.getDate() + 1);
        }
      }

      return { totalSessions, activeDays, currentStreak, longestStreak, totalCost };
    }

    /**
     * 히트맵 메트릭 전환
     */
    function changeHeatmapMetric(metric) {
      heatmapState.metric = metric;
      renderHeatmap();
    }
    // 전역 접근 (onclick에서 호출)
    window.changeHeatmapMetric = changeHeatmapMetric;

    /**
     * 네비게이션 초기화
     */
    // 탭별 스크롤 위치 저장소
    const _tabScrollPositions = {};

    function initNavigation() {
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          const prevView = state.currentView;

          // 이전 탭의 스크롤 위치 저장
          if (elements.mainContent) {
            _tabScrollPositions[prevView] = elements.mainContent.scrollTop;
          }

          navItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          state.currentView = item.dataset.view;
          localStorage.setItem('dashboard-tab', state.currentView);

          // Office lifecycle management
          if (state.currentView === 'office') {
            initOffice();
          } else if (prevView === 'office') {
            stopOffice();
          }

          // 히트맵 탭 진입 시 데이터 갱신
          if (state.currentView === 'heatmap') {
            heatmapState.data = null; // 강제 re-fetch
          }

          render();

          // 새 탭의 스크롤 위치 복원
          if (elements.mainContent && _tabScrollPositions[state.currentView]) {
            elements.mainContent.scrollTop = _tabScrollPositions[state.currentView];
          }
        });
      });
    }

    /**
     * 초기화
     */
    function init() {
      // 네비게이션 초기화
      initNavigation();

      // 저장된 탭 복원 — nav 아이템 active 클래스 동기화
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(i => {
        if (i.dataset.view === state.currentView) i.classList.add('active');
        else i.classList.remove('active');
      });

      // SSE 연결
      connectSSE();

      // 현재 뷰에 맞는 초기화
      if (state.currentView === 'office') {
        initOffice();
      }
      render();
    }

    // DOM 로드 시 초기화
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
